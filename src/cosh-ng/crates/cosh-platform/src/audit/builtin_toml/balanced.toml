# ==========================================================================
# Shell: read-only single-token commands. Safe regardless of arguments.
# ==========================================================================

[[rules]]
name = "shell-allow-readonly-singletons"
outcome = "Allow"
reason = "Read-only command"
[rules.matches]
subsystem = "shell"
operation = { one_of = [
  "uptime", "uname", "hostname", "whoami", "id", "pwd",
  "ls", "ll", "la", "cat", "head", "tail", "wc",
  "ps", "top", "htop", "df", "du", "free", "vm_stat",
  "date", "env", "printenv", "which", "whereis", "type",
  "echo", "file", "stat", "readlink", "realpath",
  "find", "locate", "grep", "rg", "ag", "awk", "sed",
  "sort", "uniq", "cut", "tr", "column",
  "hg", "svn",
  "netstat", "ss", "ifconfig", "ip", "lsof", "nslookup", "dig",
  "journalctl"
] }

# ==========================================================================
# Pkg subsystem.
# ==========================================================================

[[rules]]
name = "pkg-readonly-allow"
outcome = "Allow"
reason = "Read-only pkg operations are safe"
[rules.matches]
subsystem = "pkg"
operation = { one_of = ["search", "list"] }

[[rules]]
name = "pkg-mutating-approval"
outcome = "RequireApproval"
reason = "Pkg install/remove modifies system state"
[rules.matches]
subsystem = "pkg"
operation = { one_of = ["install", "remove"] }

# ==========================================================================
# Svc subsystem.
# ==========================================================================

[[rules]]
name = "svc-readonly-allow"
outcome = "Allow"
reason = "Read-only svc operations are safe"
[rules.matches]
subsystem = "svc"
operation = { one_of = ["status", "list"] }

[[rules]]
name = "svc-mutating-approval"
outcome = "RequireApproval"
reason = "Svc start/stop/enable/disable modifies system state"
[rules.matches]
subsystem = "svc"
operation = { one_of = ["start", "stop", "restart", "enable", "disable"] }

# ==========================================================================
# Checkpoint subsystem.
# ==========================================================================

[[rules]]
name = "checkpoint-readonly-allow"
outcome = "Allow"
reason = "Read-only checkpoint queries"
[rules.matches]
subsystem = "checkpoint"
operation = { one_of = ["list", "status", "diff"] }

[[rules]]
name = "checkpoint-mutating-approval"
outcome = "RequireApproval"
reason = "Checkpoint mutation"
[rules.matches]
subsystem = "checkpoint"
operation = { one_of = ["create", "restore", "delete", "init", "recover", "cleanup"] }

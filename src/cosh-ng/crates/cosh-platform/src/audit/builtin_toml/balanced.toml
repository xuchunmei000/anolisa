# Built-in audit policy: balanced (factory default).
#
# Translates the shell heuristics formerly in cosh-core's `is_safe_command`
# into declarative rules. Rule order is significant — the FIRST matching rule
# wins. See `docs/audit-design.md` §7.

version = "v1-balanced"
default = "RequireApproval"

# ==========================================================================
# Shell: explicit Deny for destructive single commands.
# ==========================================================================

[[rules]]
name = "shell-deny-destructive"
outcome = "Deny"
reason = "Destructive or privilege-changing command"
[rules.matches]
subsystem = "shell"
operation = { one_of = [
  "rm", "dd", "shutdown", "reboot", "halt", "poweroff",
  "init", "format", "diskutil", "curl", "wget", "sudo", "tee",
  "chmod", "chown", "mv", "cp", "ln"
] }

[[rules]]
name = "shell-deny-mkfs"
outcome = "Deny"
reason = "Filesystem creation is never auto-approved"
[rules.matches]
subsystem = "shell"
operation = { glob = "mkfs*" }

# ==========================================================================
# Shell: git mutating subcommands.
# ==========================================================================

[[rules]]
name = "shell-deny-git-mutating"
outcome = "Deny"
reason = "Mutating git subcommand"
[rules.matches]
subsystem = "shell"
operation = "git"
target = { one_of = [
  "push", "reset", "clean", "checkout", "switch", "restore",
  "rebase", "merge", "commit", "add", "rm", "mv",
  "init", "clone", "fetch", "pull",
  "tag", "apply", "am", "cherry-pick", "revert",
  "remote", "config", "submodule", "worktree",
  "filter-branch", "filter-repo", "gc", "prune",
  "update-ref", "update-index", "reflog",
  "sparse-checkout", "notes", "bisect"
] }

# git stash drop / clear / pop / apply / save / store / push / create
[[rules]]
name = "shell-deny-git-stash-mutating"
outcome = "Deny"
reason = "Mutating git stash operation"
[rules.matches]
subsystem = "shell"
operation = "git"
target = "stash"
arg = [
  { key = "drop" },
]

[[rules]]
name = "shell-deny-git-stash-clear"
outcome = "Deny"
reason = "Mutating git stash operation"
[rules.matches]
subsystem = "shell"
operation = "git"

# Catch-all for any remaining git subcommand (read-only fall-through).
[[rules]]
name = "shell-allow-git-fallback"
outcome = "Allow"
reason = "Read-only or non-mutating git subcommand"
[rules.matches]
subsystem = "shell"
operation = "git"

# ==========================================================================
# sed -i / --in-place — in-place edits mutate the file.
# ==========================================================================

[[rules]]
name = "shell-deny-sed-inplace-short"
outcome = "Deny"
reason = "sed in-place edit (-i)"
[rules.matches]
subsystem = "shell"
operation = "sed"
arg = [{ key = "-i" }]

[[rules]]
name = "shell-deny-sed-inplace-long"
outcome = "Deny"
reason = "sed in-place edit (--in-place)"
[rules.matches]
subsystem = "shell"
operation = "sed"
arg = [{ key = "--in-place" }]

[[rules]]
name = "shell-deny-sed-inplace-glob-short"
outcome = "Deny"
reason = "sed in-place edit (-i with suffix)"
[rules.matches]
subsystem = "shell"
operation = "sed"
arg = [{ key = { glob = "-i?*" } }]

[[rules]]
name = "shell-deny-sed-inplace-glob-long"
outcome = "Deny"
reason = "sed in-place edit (--in-place=...)"
[rules.matches]
subsystem = "shell"
operation = "sed"
arg = [{ key = { glob = "--in-place=*" } }]

# ==========================================================================
# find -exec / -delete / -fprint* — destructive or write-side-effects.
# ==========================================================================

[[rules]]
name = "shell-deny-find-destructive"
outcome = "Deny"
reason = "find action with side effects"
[rules.matches]
subsystem = "shell"
operation = "find"
arg = [{ key = { one_of = ["-exec", "-execdir", "-delete", "-ok", "-okdir", "-fprint", "-fprint0", "-fprintf", "-fls"] } }]

# ==========================================================================
# Shell: read-only (head, subcommand) safe pairs.
# ==========================================================================

[[rules]]
name = "shell-allow-systemctl-readonly"
outcome = "Allow"
[rules.matches]
subsystem = "shell"
operation = "systemctl"
target = { one_of = ["status", "is-active", "is-enabled", "list-units", "list-unit-files", "show", "cat"] }

[[rules]]
name = "shell-allow-brew-readonly"
outcome = "Allow"
[rules.matches]
subsystem = "shell"
operation = "brew"
target = { one_of = ["list", "info", "search", "--version"] }

[[rules]]
name = "shell-allow-apt-readonly"
outcome = "Allow"
[rules.matches]

manifest_version = 2
anolisa_min_version = "0.1.0"

[component]
name = "cosh"
version = "0.11.0"
layer = "runtime"
domain = "tools"
description = "Computable Operating System Harness (cosh-ng) - a deterministic Agent-OS interface"
stability = "experimental"

[install]
modes = ["system"]

[backends.rpm]
package = "cosh-ng"

[environment]
requires_os = "linux"
requires_arch = ["x86_64", "aarch64"]

[dependencies]
runtime = ["openssl-libs"]

[[health_checks]]
name = "launcher"
kind = "command"
command = "{bindir}/cosh-cli --version"

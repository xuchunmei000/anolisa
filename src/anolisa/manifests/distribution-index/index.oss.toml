# DistributionIndex (schema v1) — OSS-targeted template.
#
# ============================================================================
# WARNING — PLACEHOLDER CHECKSUMS (P1-J operations work)
# ============================================================================
# Every `sha256 = ""` row in this file is a PLACEHOLDER awaiting real OSS
# artifact upload. Real (non-dry-run) `anolisa enable <cap>` against an
# index with empty sha256 rows will fail loudly with `MissingChecksum`.
#
# Fixing this is *operations work*, not code:
#   1. publish the real artifacts to OSS at the URLs listed below;
#   2. compute the sha256sum of each;
#   3. fill in the matching `sha256 = "..."` row here (and uncomment any
#      pending signature placeholders);
#   4. ideally publish a separate `<artifact>.sha256` file alongside the
#      artifact so callers can pass ANOLISA_*_SHA256 to install-anolisa.sh.
#
# This is tracked under P1-J. Until those steps are done, install-anolisa.sh
# emits a WARN per missing-sha256 row (capped to 5), and `--strict` will
# REFUSE to finish.
# ============================================================================
#
# This file is the source for the packaged install. `install-anolisa.sh`
# substitutes the `@ANOLISA_MIRROR@` and `@ANOLISA_CHANNEL@` placeholders
# below using the values from the install-time environment (defaults:
# `https://anolisa.oss-cn-hangzhou.aliyuncs.com` and `stable`), and writes
# the result to `${ANOLISA_PREFIX}/share/anolisa/manifests/distribution-index/index.toml`.
#
# The dev-tree `index.toml` next to this file is for local development and may
# carry reviewed release entries. This OSS template is for the *installed*
# datadir and rewrites mirror/channel placeholders during packaging.
#
# Scope of entries today (P1-A):
#
#   * `agentsight` 0.2.0 — only enough to make
#     `anolisa enable agent-observability --dry-run` resolve an artifact on
#     a Linux x86_64 host. The dry-run planner is pure (no IO), so the URL
#     does not need to exist yet — the row is here so the resolver finds a
#     match instead of marking the component as `blocked: no entry`.
#   * Real artifact upload + sha256 happen in P1-J. Until then `sha256` is
#     left blank, which means a *real* execute (`anolisa enable
#     agent-observability` without `--dry-run`) will surface
#     `INVALID_ARGUMENT: component 'agentsight' has no sha256 in the
#     distribution index` — that is the intentionally-loud failure mode
#     for an unpublished artifact.
#
# TODO(P1-J, owner: release-ops): populate sha256, signature_url, size once OSS publishes the
# real artifact. Add the corresponding rpm + macOS rows here too (the
# component manifest already lists install_modes/services that imply
# those targets exist).

schema_version = 1
channel = "stable"
publisher = "anolisa"

# -----------------------------------------------------------------------------
# agentsight 0.2.0 — Linux x86_64 tarball (system mode).
# Covers `anolisa enable agent-observability` on the alpha-supported target.
# -----------------------------------------------------------------------------
[[entries]]
component = "agentsight"
version = "0.2.0"
channel = "stable"
artifact_id = "agentsight-0.2.0-linux-x86_64-tar"
artifact_type = "tar_gz"
backend = "aliyun-oss"
url = "@ANOLISA_MIRROR@/releases/@ANOLISA_CHANNEL@/agentsight/0.2.0/agentsight-0.2.0-linux-x86_64.tar.gz"
os = "linux"
arch = "x86_64"
install_modes = ["system"]
# TODO(P1-J, owner: release-ops): replace with the real artifact sha256 once OSS publishes it.
# Until then the row is intentionally empty so `install-anolisa.sh --strict`
# refuses to finish (and non-strict runs emit a WARN). A real
# `anolisa enable agent-observability` (no --dry-run) against this entry
# fails with MissingChecksum / sha256 mismatch.
sha256 = ""
# signature_url = "@ANOLISA_MIRROR@/releases/@ANOLISA_CHANNEL@/agentsight/0.2.0/agentsight-0.2.0-linux-x86_64.tar.gz.sig"
# size = 0
dependencies = ["kernel-headers"]

# TODO(P1-J, owner: release-ops): agentsight 0.2.0 — alinux x86_64 RPM (system mode).
#   Once the RPM is published to the alinux yum repo we publish the row
#   here so `enable agent-observability` prefers the native package on
#   alinux hosts (artifact_type = "rpm", backend = "yum-repo").
#
# TODO(P1-J, owner: release-ops): agentsight 0.2.0 — Linux aarch64 tarball.
#   Component manifest pins requires_arch = ["x86_64"] for now, so adding
#   aarch64 here without first relaxing the manifest would only make the
#   dry-run output misleading. Land them together when aarch64 graduates.
#
# TODO(P1-J, owner: release-ops): tokenless / agent-memory / agent-sec-core artifacts.
#   The execution policy graduates `token-optimization`, but the runtime
#   `tokenless` component is not yet published. Add the row here when it
#   ships so `enable token-optimization --dry-run` resolves an artifact
#   instead of falling back to `blocked: no entry`.

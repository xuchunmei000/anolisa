[capability]
name = "sandbox"
description = "Sandbox isolation for Agent workloads"

# `sandbox` is implemented by concrete osbase backend components. Backend
# availability is environment-gated in each component manifest:
#   - kata / firecracker: require KVM-capable host
#   - landlock:           require kernel >= 5.13
[implementation]
components = ["sandbox-container", "sandbox-kata", "sandbox-firecracker", "sandbox-landlock"]
features."sandbox-kata" = ["backend_kata"]
features."sandbox-firecracker" = ["backend_firecracker"]
features."sandbox-landlock" = ["backend_landlock"]

[requires_env]
os = "linux"
arch = ["x86_64", "aarch64"]
# At least one backend must satisfy its own gate; resolver intersects.

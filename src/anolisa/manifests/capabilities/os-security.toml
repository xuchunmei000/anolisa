[capability]
name = "os-security"
description = "OS kernel-level security hardening"

# Currently the only backend is `loongshield`; adding new backends later should
# add real component names here rather than a placeholder umbrella component.
[implementation]
components = ["loongshield"]
features."loongshield" = ["backend_loongshield"]

[requires_env]
os = "linux"
arch = ["x86_64", "aarch64"]

manifest_version = 2
anolisa_min_version = "0.1.0"

[component]
name = "cosh"
version = "2.4.1"
layer = "runtime"
domain = "tools"
description = "Copilot shell launcher and deterministic CLI gateway"
stability = "experimental"

[source]
path = "src/copilot-shell"
upstream = "workspace"

[distribution]
default_channel = "stable"
allowed_channels = ["stable"]
index_ref = "builtin"
source_fallback = false
checksum = "sha256"

[[distribution.selectors]]
install_mode = "system"
os = ["linux"]
arch = ["x86_64"]
libc = "glibc"
preferred_artifact_types = ["tar_gz"]

[build]
system = "npm"
targets = ["package:anolisa"]

[build.toolchain]
node = ">=20.0"

[install]
modes = ["system"]

[[install.files]]
source = "bin/launcher"
dest = "{bindir}/cosh"
mode = "0755"
owner = "anolisa"

[[install.files]]
source = "bin/launcher"
dest = "{bindir}/co"
mode = "0755"
owner = "anolisa"

[[install.files]]
source = "bin/launcher"
dest = "{bindir}/copilot"
mode = "0755"
owner = "anolisa"

[[install.files]]
source = "lib/resources.tar.gz"
dest = "{libexecdir}/copilot-shell/resources.tar.gz"
mode = "0644"
owner = "anolisa"

[environment]
requires_os = "linux"
requires_arch = ["x86_64"]

[dependencies]
runtime = ["node>=20"]

[[health_checks]]
name = "launcher"
kind = "command"
command = "{bindir}/cosh --version"

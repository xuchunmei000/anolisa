manifest_version = 2
anolisa_min_version = "0.1.0"

[component]
name = "skillfs"
version = "0.3.0"
layer = "runtime"
domain = "tools"
description = "AI agent skill management via virtual filesystem"
stability = "experimental"

[install]
modes = ["system"]

[backends.rpm]
package = "skillfs"

[environment]
requires_os = "linux"

[dependencies]
runtime = ["fuse3"]

[[health_checks]]
name = "binary"
kind = "command"
command = "{bindir}/skillfs --version"
